<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Plasma Lamp</title>
<style>
*{margin:0;padding:0;background:#000}
body{overflow:hidden}
canvas{display:block;width:100vw;height:100vh}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
<script>
var renderer=new THREE.WebGLRenderer({antialias:false});
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
document.body.appendChild(renderer.domElement);

var scene=new THREE.Scene();
var camera=new THREE.PerspectiveCamera(60,window.innerWidth/window.innerHeight,0.1,100);
camera.position.z=2.5;

var geo=new THREE.SphereGeometry(1,64,64);
var mat=new THREE.ShaderMaterial({
  vertexShader:[
    'varying vec2 vUv;',
    'varying vec3 vNormal;',
    'varying vec3 vPos;',
    'void main(){',
    '  vUv=uv;',
    '  vNormal=normalize(normalMatrix*normal);',
    '  vPos=(modelViewMatrix*vec4(position,1.0)).xyz;',
    '  gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);',
    '}'
  ].join('\n'),
  fragmentShader:[
    'precision highp float;',
    'uniform float uTime;',
    'uniform vec2 uRes;',
    'varying vec2 vUv;',
    'varying vec3 vNormal;',
    'varying vec3 vPos;',

    // IQ-style plasma palette
    'vec3 palette(float t){',
    '  vec3 a=vec3(0.5,0.5,0.5);',
    '  vec3 b=vec3(0.5,0.5,0.5);',
    '  vec3 c=vec3(1.0,1.0,1.0);',
    '  vec3 d=vec3(0.0,0.33,0.67);',
    '  return a+b*cos(6.28318*(c*t+d));',
    '}',

    // Smooth noise
    'float hash(vec2 p){',
    '  return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453);',
    '}',

    'float noise(vec2 p){',
    '  vec2 i=floor(p);',
    '  vec2 f=fract(p);',
    '  f=f*f*(3.0-2.0*f);',
    '  return mix(mix(hash(i),hash(i+vec2(1,0)),f.x),',
    '         mix(hash(i+vec2(0,1)),hash(i+vec2(1,1)),f.x),f.y);',
    '}',

    'float fbm(vec2 p){',
    '  float v=0.0;',
    '  float a=0.5;',
    '  for(int i=0;i<4;i++){',
    '    v+=a*noise(p);',
    '    p*=2.0;',
    '    a*=0.5;',
    '  }',
    '  return v;',
    '}',

    // Domain warping - the secret sauce
    'float plasma(vec2 p,float t){',
    '  float v=0.0;',
    '  // Four sine waves at different frequencies',
    '  v+=0.5*sin(p.x*3.0+t*0.8);',
    '  v+=0.3*sin(p.y*4.0-t*1.2);',
    '  v+=0.2*sin((p.x+p.y)*5.0+t*0.5);',
    '  v+=0.1*sin(length(p)*8.0-t*2.0);',
    '  // Domain warp',
    '  vec2 warp=vec2(fbm(p+t*0.2),fbm(p+t*0.15));',
    '  v+=0.15*fbm(p*2.0+warp*2.0);',
    '  return v;',
    '}',

    'void main(){',
    '  float t=uTime*0.5;',

    '  // Spherical UV mapping',
    '  vec2 uv=vUv*2.0-1.0;',
    '  float r=length(uv);',
    '  if(r>1.0){',
    '    gl_FragColor=vec4(0.0,0.0,0.0,1.0);',
    '    return;',
    '  }',

    '  // Back to sphere space',
    '  float theta=atan(uv.y,uv.x);',
    '  float phi=acos(1.0-r*r);',
    '  vec3 sphereP=vec3(sin(phi)*cos(theta),sin(phi)*sin(theta),cos(phi));',

    '  // Apply plasma on sphere surface',
    '  vec2 plasmaUV=sphereP.xy*2.0+sphereP.z*0.5;',
    '  float v=plasma(plasmaUV,t);',

    '  // Second layer of plasma for depth',
    '  float v2=plasma(plasmaUV*1.5-vec2(t*0.1,t*0.15),t*0.7);',
    '  v=mix(v,v2,0.4);',

    '  // Map to color',
    '  float t2=(v+2.0)/4.0;',
    '  vec3 col=palette(t2);',

    '  // Fresnel rim',
    '  vec3 viewDir=normalize(cameraPosition-vPos);',
    '  float fres=pow(1.0-max(dot(vNormal,viewDir),0.0),2.5);',
    '  vec3 rimCol=palette(t2+0.2);',
    '  col=mix(col,rimCol,fres*0.6);',

    '  // Specular highlight',
    '  vec3 lightDir=normalize(vec3(1.0,1.0,1.0));',
    '  float spec=pow(max(dot(reflect(-lightDir,vNormal),viewDir),0.0),16.0);',
    '  col+=vec3(1.0)*spec*0.3;',

    '  // Inner glow',
    '  col+=vec3(0.1,0.05,0.15)*0.3;',

    '  // Tone map',
    '  col=col/(1.0+col);',
    '  col=pow(col,vec3(0.4545));',

    '  gl_FragColor=vec4(col,1.0);',
    '}'
  ].join('\n'),
  uniforms:{
    uTime:{value:0},
    uRes:{value:new THREE.Vector2(window.innerWidth,window.innerHeight)}
  },
  side:THREE.FrontSide
});

var mesh=new THREE.Mesh(geo,mat);
scene.add(mesh);

// Inner glow sphere
var geo2=new THREE.SphereGeometry(0.98,32,32);
var mat2=new THREE.ShaderMaterial({
  vertexShader:['varying vec3 vNormal;','void main(){','vNormal=normalize(normalMatrix*normal);','gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);','}'].join('\n'),
  fragmentShader:[
    'precision highp float;',
    'uniform float uTime;',
    'varying vec3 vNormal;',
    'void main(){',
    '  float rim=1.0-abs(dot(vNormal,vec3(0.0,0.0,1.0)));',
    '  rim=pow(rim,2.0);',
    '  vec3 col=vec3(0.8,0.2,0.9)*rim*0.15;',
    '  gl_FragColor=vec4(col,1.0);',
    '}'
  ].join('\n'),
  uniforms:{uTime:{value:0}},
  transparent:true,
  side:THREE.BackSide,
  blending:THREE.AdditiveBlending,
  depthWrite:false
});
var mesh2=new THREE.Mesh(geo2,mat2);
scene.add(mesh2);

window.onresize=function(){
  camera.aspect=window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
  mat.uniforms.uRes.value.set(window.innerWidth,window.innerHeight);
};

var clock=new THREE.Clock();
function animate(){
  requestAnimationFrame(animate);
  var t=clock.getElapsedTime();
  mat.uniforms.uTime.value=t;
  mat2.uniforms.uTime.value=t;
  mesh.rotation.y=t*0.2;
  mesh2.rotation.y=t*0.2;
  renderer.render(scene,camera);
}
animate();
</script>
</body>
</html>
