<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Energy Sphere</title>
<style>
*{margin:0;padding:0;background:#000}
body{overflow:hidden}
canvas{display:block;width:100vw;height:100vh}
</style>
</head>
<body>
<script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
<script>
var renderer=new THREE.WebGLRenderer({antialias:false});
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio,1.5));
document.body.appendChild(renderer.domElement);

var scene=new THREE.Scene();
var camera=new THREE.PerspectiveCamera(60,window.innerWidth/window.innerHeight,0.1,100);
camera.position.z=3;

var geo=new THREE.SphereGeometry(1,64,64);
var mat=new THREE.ShaderMaterial({
  vertexShader:[
    'varying vec3 vNormal;',
    'varying vec3 vPosition;',
    'varying vec2 vUv;',
    'uniform float uTime;',

    'void main(){',
    '  vNormal=normalize(normalMatrix*normal);',
    '  vPosition=position;',
    '  vUv=uv;',
    '  gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);',
    '}'
  ].join('\n'),
  fragmentShader:[
    'precision mediump float;',
    'uniform float uTime;',
    'varying vec3 vNormal;',
    'varying vec3 vPosition;',
    'varying vec2 vUv;',

    'float hash(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5);}',
    'float noise(vec2 p){',
    '  vec2 i=floor(p),f=fract(p);f=f*f*(3.0-2.0*f);',
    '  return mix(mix(hash(i),hash(i+vec2(1,0)),f.x),',
    '         mix(hash(i+vec2(0,1)),hash(i+vec2(1,1)),f.x),f.y);',
    '}',
    'float fbm(vec2 p){',
    '  float v=0.0,a=0.5;',
    '  for(int i=0;i<4;i++){v+=a*noise(p);p*=2.1;a*=0.5;}',
    '  return v;',
    '}',

    'vec2 hexCenter(vec2 p){',
    '  vec2 r=vec2(1.0,1.732);',
    '  vec2 h=r*0.5;',
    '  vec2 a=mod(p,r)-h;',
    '  vec2 b=mod(p-h,r)-h;',
    '  return dot(a,a)<dot(b,b)?a:b;',
    '}',
    'float hexDist(vec2 p){',
    '  p=abs(p);',
    '  return max(dot(p,vec2(0.866,0.5)),p.x);',
    '}',
    'float hexGrid(vec2 uv,float sc){',
    '  float d=hexDist(hexCenter(uv*sc));',
    '  return smoothstep(0.06,0.0,abs(d-0.4));',
    '}',

    'void main(){',
    '  float t=uTime;',
    '  vec3 viewDir=normalize(cameraPosition-vPosition);',
    '  float fresnel=pow(1.0-max(dot(vNormal,viewDir),0.0),2.5);',

    '  float phi=atan(vPosition.z,vPosition.x);',
    '  float theta=acos(clamp(vPosition.y/1.0,-1.0,1.0));',
    '  vec2 sUV=vec2(theta,phi);',

    '  float h1=hexGrid(sUV,1.8);',
    '  float h2=hexGrid(sUV*3.5+vec2(t*0.05,t*0.03),1.0);',
    '  float hex=h1+h2*0.7;',

    '  float pulse=sin(length(vPosition)*7.0-t*2.0)*0.5+0.5;',
    '  float pulse2=sin(length(vPosition)*11.0-t*3.5)*0.5+0.5;',
    '  hex*=pulse*0.7+0.3;',
    '  hex+=hex*pulse2*0.2;',

    '  vec2 nu=vPosition.xy*3.0+vec2(vPosition.z+t*0.1,0.0);',
    '  float nf=fbm(nu);',
    '  float nf2=fbm(nu*2.0+vec2(3.1,1.7));',
    '  float nf3=fbm(nu*4.0+vec2(1.2,4.3));',
    '  float surf=nf*0.5+nf2*0.3+nf3*0.2;',

    '  vec3 cyan=vec3(0.0,0.9,1.0);',
    '  vec3 blue=vec3(0.1,0.3,1.0);',
    '  vec3 violet=vec3(0.5,0.0,1.0);',

    '  vec3 energy=mix(cyan,blue,fresnel);',
    '  energy=mix(energy,violet,surf*0.3);',

    '  float bright=hex*(fresnel*0.8+0.2)*(surf*0.5+0.5)*3.0;',
    '  vec3 col=energy*bright;',

    '  float rim=pow(fresnel,1.8)*2.0;',
    '  col+=cyan*rim;',

    '  float inner=pow(max(dot(vNormal,viewDir),0.0),0.2);',
    '  col+=mix(cyan,blue,inner)*inner*0.8;',

    '  // Halo',
    '  float halo=pow(fresnel,0.5)*0.8;',
    '  col+=mix(vec3(0.0,0.7,1.0),vec3(0.1,0.4,1.0),fract(t*0.08))*halo;',
    '  col+=vec3(0.0,0.5,1.0)*halo*halo;',

    '  // Background grid',
    '  vec2 bgUV=vUv*10.0;',
    '  float bgH=hexGrid(bgUV,1.0)*0.04;',
    '  col+=vec3(0.0,0.1,0.2)*bgH;',

    '  // Vignette',
    '  float vig=1.0-dot(vUv-0.5,vUv-0.5)*2.0;',
    '  col*=vig;',

    '  col=col/(1.0+col);',
    '  col=pow(col,vec3(0.4545));',

    '  gl_FragColor=vec4(col,1.0);',
    '}'
  ].join('\n'),
  uniforms:{
    uTime:{value:0}
  },
  transparent:true,
  side:THREE.FrontSide
});

var mesh=new THREE.Mesh(geo,mat);
scene.add(mesh);

var geo2=new THREE.SphereGeometry(1.02,32,32);
var mat2=new THREE.ShaderMaterial({
  vertexShader:[
    'varying vec3 vNormal;',
    'void main(){',
    '  vNormal=normalize(normalMatrix*normal);',
    '  gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);',
    '}'
  ].join('\n'),
  fragmentShader:[
    'precision mediump float;',
    'uniform float uTime;',
    'varying vec3 vNormal;',
    'void main(){',
    '  float rim=pow(1.0-abs(dot(vNormal,vec3(0.0,0.0,1.0))),2.0);',
    '  vec3 col=mix(vec3(0.0,0.7,1.0),vec3(0.1,0.4,1.0),fract(uTime*0.08))*rim*0.5;',
    '  col+=vec3(0.0,0.5,1.0)*rim*rim*0.8;',
    '  gl_FragColor=vec4(col,1.0);',
    '}'
  ].join('\n'),
  uniforms:{uTime:{value:0}},
  transparent:true,
  side:THREE.BackSide,
  blending:THREE.AdditiveBlending,
  depthWrite:false
});

var mesh2=new THREE.Mesh(geo2,mat2);
scene.add(mesh2);

window.onresize=function(){
  camera.aspect=window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
};

var t=0;
function animate(){
  requestAnimationFrame(animate);
  t+=0.016;
  mat.uniforms.uTime.value=t;
  mat2.uniforms.uTime.value=t;
  mesh.rotation.y+=0.003;
  mesh2.rotation.y+=0.003;
  renderer.render(scene,camera);
}
animate();
</script>
</body>
</html>
