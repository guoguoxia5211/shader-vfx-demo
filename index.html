<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>能量球</title>
<style>
*{margin:0;padding:0;background:#000}
body{overflow:hidden}
canvas{display:block;width:100vw;height:100vh;background:#000}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
var canvas=document.getElementById('c');
var gl=canvas.getContext('webgl',{antialias:false,alpha:false});
if(!gl){document.body.innerHTML='<p style="color:#fff;padding:40">WebGL不可用</p>';}

function resize(){
  var dpr=Math.min(window.devicePixelRatio||1,2);
  canvas.width=window.innerWidth*dpr;
  canvas.height=window.innerHeight*dpr;
  canvas.style.width=window.innerWidth+'px';
  canvas.style.height=window.innerHeight+'px';
  gl.viewport(0,0,canvas.width,canvas.height);
}
window.onresize=resize;
resize();

var VERT='attribute vec2 a;void main(){gl_Position=vec4(a,0.0,1.0);}';

var FRAG=[
'precision mediump float;',
'uniform float uTime;',
'uniform vec2 uRes;',

// IQ palette - hot to cold
'vec3 palette(float t){',
'  vec3 a=vec3(0.5,0.5,0.5);',
'  vec3 b=vec3(0.5,0.5,0.5);',
'  vec3 c=vec3(1.0,1.0,1.0);',
'  vec3 d=vec3(0.0,0.33,0.67);',
'  return a+b*cos(6.28318*(c*t+d));',
'}',

// hash
'float h(vec2 p){',
'  return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453);',
'}',

// 2D noise
'float n(vec2 p){',
'  vec2 i=floor(p);',
'  vec2 f=fract(p);',
'  f=f*f*(3.0-2.0*f);',
'  float a=h(i);',
'  float b=h(i+vec2(1.0,0.0));',
'  float c=h(i+vec2(0.0,1.0));',
'  float d=h(i+vec2(1.0,1.0));',
'  return mix(mix(a,b,f.x),mix(c,d,f.x),f.y);',
'}',

// FBM
'float fbm(vec2 p){',
'  float v=0.0;',
'  float a=0.5;',
'  for(int i=0;i<5;i++){',
'    v+=a*n(p);',
'    p=p*2.0;',
'    a=a*0.5;',
'  }',
'  return v;',
'}',

// rotation
'mat2 rot(float a){',
'  float c=cos(a),s=sin(a);',
'  return mat2(c,-s,s,c);',
'}',

'void main(){',
'  float t=uTime;',
'  float aspect=uRes.x/uRes.y;',
'  vec2 uv=(gl_FragCoord.xy/uRes-0.5)*vec2(aspect,1.0);',

'  // camera orbit',
'  vec3 ro=vec3(0.0,0.0,2.8);',
'  vec3 rd=normalize(vec3(uv,-1.5));',
'  rd.xz=rot(t*0.12)*rd.xz;',
'  rd.yz=rot(sin(t*0.08)*0.3)*rd.yz;',
'  ro.xz=rot(t*0.12)*ro.xz;',
'  ro.yz=rot(sin(t*0.08)*0.3)*ro.yz;',

'  // sphere intersection',
'  float R=1.0;',
'  float B=2.0*dot(rd,ro);',
'  float C=dot(ro,ro)-R*R;',
'  float D=B*B-4.0*C;',

'  vec3 col=vec3(0.0,0.0,0.02);',

'  if(D>0.0){',
'    float sD=sqrt(D);',
'    float tc=(-B-sD)*0.5;',
'    if(tc<0.0)tc=(-B+sD)*0.5;',
'    if(tc>0.0){',
'      vec3 p=ro+rd*tc;',
'      vec3 n=normalize(p);',
'      vec3 v=normalize(ro-p);',

'      // spherical coords',
'      float phi=atan(p.z,p.x);',
'      float theta=acos(p.y/R);',
'      vec2 sph=vec2(theta,phi);',

'      // layer 1: plasma with domain warp',
'      vec2 p1=sph*3.0;',
'      p1.x+=t*0.2;',
'      p1.y+=t*0.15;',
'      float v1=0.0;',
'      v1+=sin(p1.x*2.0+t*1.2)*0.5;',
'      v1+=sin(p1.y*3.0-t*0.8)*0.4;',
'      v1+=sin((p1.x+p1.y)*4.0+t*0.5)*0.3;',
'      v1+=sin(length(p1)*5.0-t*2.0)*0.2;',
'      vec2 warp=vec2(fbm(p1+vec2(t*0.1,0.0)),fbm(p1+vec2(0.0,t*0.15)));',
'      vec2 p2=p1+warp*0.6;',
'      float v2=fbm(p2);',
'      float plasma=mix(v1*0.5+0.5,v2,0.35);',

'      // layer 2: fast detail',
'      vec2 p3=sph*5.0-vec2(t*0.3,t*0.2);',
'      float v3=0.0;',
'      v3+=sin(p3.x*2.5+t*1.8)*0.4;',
'      v3+=sin(p3.y*3.5-t*1.2)*0.3;',
'      v3+=sin(length(p3)*4.0+t*2.5)*0.3;',
'      float detail=v3*0.5+0.5;',

'      float finalPlasma=plasma*0.7+detail*0.3;',
'      float colorT=finalPlasma*2.5+t*0.08;',
'      vec3 baseCol=palette(colorT);',

'      // fresnel',
'      float fres=pow(1.0-max(dot(n,v),0.0),2.5);',

'      // hex pattern on sphere',
'      vec2 hexUV=sph*vec2(2.0,3.0);',
'      hexUV.x+=t*0.05;',
'      float hx=fract(hexUV.x);',
'      float hy=fract(hexUV.y);',
'      float hex=step(0.95,hx)*step(0.95,hy);',

'      // combine',
'      vec3 energy=baseCol;',
'      float bright=fres*2.0*(plasma*0.6+0.4)*2.5;',
'      col=vec3(energy.r*bright,energy.g*bright,energy.b*bright);',
'      col+=energy*fres*1.5;',
'      col+=vec3(1.0,0.9,0.5)*hex*fres*0.3;',

'      // pulse',
'      float pulse=sin(length(p)*3.0-t*2.0)*0.5+0.5;',
'      col+=col*pulse*0.15;',

'      // inner glow',
'      float inner=pow(max(dot(n,v),0.0),0.3);',
'      col+=vec3(1.0,0.4,0.1)*inner*0.4;',
'    }',
'  }',

'  // outer glow',
'  if(D>0.0){',
'    float sD=sqrt(D);',
'    float tE=(-B-sD)*0.5;',
'    float tX=(-B+sD)*0.5;',
'    float thick=max(0.0,tX-max(tE,0.0));',
'    float halo=pow(thick/R,0.5)*0.9;',
'    vec3 haloCol=palette(t*0.08);',
'    col+=haloCol*halo;',
'    col+=vec3(1.0,0.5,0.1)*halo*halo*0.5;',
'    float camD=length(ro);',
'    float angR=asin(R/camD);',
'    float angD=acos(dot(normalize(-ro),rd));',
'    float corona=exp(-angD*4.0/angR)*0.7;',
'    col+=vec3(1.0,0.6,0.1)*corona*0.5;',
'    col+=vec3(1.0,0.3,0.0)*pow(corona,2.0)*0.8;',
'  }',

'  // background pulse',
'  float bgPulse=sin(t*0.5)*0.5+0.5;',
'  col+=vec3(0.0,bgPulse*0.03,bgPulse*0.05)*0.3;',

'  // vignette',
'  float vig=1.0-dot(uv,uv)*0.6;',
'  col*=vig;',

'  // tone map',
'  col=col/(1.0+col);',
'  col=pow(col,vec3(0.4545));',

'  gl_FragColor=vec4(col,1.0);',
'}'
].join('\n');

function compile(src,type){
  var s=gl.createShader(type);
  gl.shaderSource(s,src);
  gl.compileShader(s);
  if(!gl.getShaderParameter(s,gl.COMPILE_STATUS)){
    document.body.innerHTML='<p style="color:#f00;padding:20;font-size:12">GLSL错误:'+gl.getShaderInfoLog(s).slice(0,300)+'</p>';
    return null;
  }
  return s;
}

var vs=compile(VERT,gl.VERTEX_SHADER);
var fs=compile(FRAG,gl.FRAGMENT_SHADER);
if(!vs||!fs)console.error('compile failed');

var prog=gl.createProgram();
gl.attachShader(prog,vs);
gl.attachShader(prog,fs);
gl.linkProgram(prog);
gl.useProgram(prog);

var buf=gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER,buf);
gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,1,-1,-1,1,1,1]),gl.STATIC_DRAW);
var loc=gl.getAttribLocation(prog,'a');
gl.enableVertexAttribArray(loc);
gl.vertexAttribPointer(loc,2,gl.FLOAT,false,0,0);

var uTime=gl.getUniformLocation(prog,'uTime');
var uRes=gl.getUniformLocation(prog,'uRes');

var start=performance.now();
(function loop(){
  gl.uniform1f(uTime,(performance.now()-start)/1000.0);
  gl.uniform2f(uRes,canvas.width,canvas.height);
  gl.drawArrays(gl.TRIANGLE_STRIP,0,4);
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
